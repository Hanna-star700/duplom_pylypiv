<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1625"/>
      <stop offset="50%" style="stop-color:#2d2640"/>
      <stop offset="100%" style="stop-color:#1e1b2e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#sky)"/>
  <!-- Laptop / monitor frame -->
  <rect x="120" y="280" width="560" height="340" rx="12" fill="#252330" stroke="rgba(139,92,246,0.4)" stroke-width="2"/>
  <rect x="140" y="300" width="520" height="280" rx="6" fill="url(#screen)"/>
  <!-- Code lines -->
  <g fill="none" stroke-width="2" stroke-linecap="round">
    <line x1="180" y1="340" x2="380" y2="340" stroke="#8b5cf6" opacity="0.9"/>
    <line x1="180" y1="380" x2="420" y2="380" stroke="#a78bfa" opacity="0.8"/>
    <line x1="200" y1="420" x2="340" y2="420" stroke="#c4b5fd" opacity="0.7"/>
    <line x1="200" y1="460" x2="480" y2="460" stroke="#8b5cf6" opacity="0.85"/>
    <line x1="180" y1="500" x2="360" y2="500" stroke="#a78bfa" opacity="0.8"/>
    <line x1="220" y1="540" x2="440" y2="540" stroke="#c4b5fd" opacity="0.75"/>
    <line x1="180" y1="580" x2="300" y2="580" stroke="#6366f1" opacity="0.9"/>
  </g>
  <!-- Brackets / symbols -->
  <text x="165" y="342" font-family="monospace" font-size="18" fill="#22d3ee">def</text>
  <text x="165" y="422" font-family="monospace" font-size="18" fill="#f472b6">for</text>
  <text x="165" y="502" font-family="monospace" font-size="18" fill="#a78bfa">return</text>
  <!-- Glow effect -->
  <rect x="0" y="0" width="800" height="1000" fill="url(#glow)" opacity="0.15" filter="url(#soft)"/>
  <!-- Floating code snippets -->
  <text x="80" y="180" font-family="monospace" font-size="14" fill="rgba(139,92,246,0.4)">{ }</text>
  <text x="680" y="220" font-family="monospace" font-size="14" fill="rgba(99,102,241,0.35)">=&gt;</text>
  <text x="100" y="720" font-family="monospace" font-size="12" fill="rgba(139,92,246,0.3)">function()</text>
  <text x="620" y="780" font-family="monospace" font-size="12" fill="rgba(99,102,241,0.3)">import</text>
</svg>
